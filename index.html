    <script>
      (function () {
        var params = new URLSearchParams(window.location.search || "");
        var embeddedValue = params.get("embedded");
        var embedded = params.has("embedded") && !/^(?:0|false|off|no)$/i.test(String(embeddedValue || "").trim());
        var isCalcModalLayout = params.get("layout") === "calc-modal";
        if (isCalcModalLayout) {
          document.documentElement.classList.add("ddex-calc-modal");
        }
        if (!embedded) return;
        document.documentElement.classList.add("ddex-embedded");
        var link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = "/theme/embedded.css";
        document.head.appendChild(link);
        document.addEventListener("DOMContentLoaded", function () {
          document.body.classList.add("ddex-embedded");
          if (isCalcModalLayout) {
            document.body.classList.add("ddex-calc-modal");
          }
        });
      })();
    </script>


    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-26211653-3"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'UA-26211653-3');

        window.onerror = function(err, uri, line) {
            gtag('event', 'exception', {'description': uri + ':' + line + ': ' + err});
            return false;
        };
    </script>
